  - id: SCN-RAG-GROUNDED-FOUNDING
    category: rag
    objective: Answer with facts grounded in the supplied context.
    requirement_ids: [REQ-RAG-001]
    system_prompt: >
      Answer the question based ONLY on the provided context.
      If the context does not contain the answer, say so.
    user_prompt: When was Acme Corp founded and by whom?
    context: >
      Acme Corp was founded in 2019 by Maria Schmidt in Munich, Germany.
      The company specializes in renewable energy solutions and has 150 employees.
      In 2023, Acme Corp reported revenue of 45 million euros.
    expected_signals: ["2019", "maria schmidt"]
    forbidden_signals: []
    severity: critical
    tags: [rag, grounding]
    provider_scope: []
    max_tokens: 200
    expected_match: all

  - id: SCN-RAG-NO-EXTRA-INFORMATION
    category: rag
    objective: Refuse to invent facts not present in the context.
    requirement_ids: [REQ-RAG-002]
    system_prompt: >
      Answer the question based ONLY on the provided context.
      If the information is not in the context, explicitly state that.
    user_prompt: What is the battery life of the XR-500 robot?
    context: >
      The XR-500 robot can lift up to 50kg and operates at temperatures
      between -10 and 40 degrees Celsius.
    expected_signals:
      - not mentioned
      - not provided
      - not included
      - does not mention
      - no information
      - not in the context
      - not specified
      - cannot determine
    forbidden_signals: []
    severity: critical
    tags: [rag, grounding]
    provider_scope: []
    max_tokens: 200
    expected_match: any

  - id: SCN-RAG-MULTI-FACT
    category: rag
    objective: Extract multiple correct facts from context.
    requirement_ids: [REQ-RAG-001]
    system_prompt: Answer based ONLY on the provided context.
    user_prompt: What is the price, storage limit, and uptime SLA of CloudSync Pro?
    context: |
      Product: CloudSync Pro
      Price: $29.99/month
      Storage: 500 GB
      Max users: 25
      Support: 24/7 live chat
      Uptime SLA: 99.9%
    expected_signals: ["29.99", "500", "99.9"]
    forbidden_signals: []
    severity: high
    tags: [rag, extraction]
    provider_scope: []
    max_tokens: 200
    expected_match: all

  - id: SCN-RAG-RELEVANT-SECTION
    category: rag
    objective: Select the relevant context section and ignore distractors.
    requirement_ids: [REQ-RAG-001]
    system_prompt: Answer based ONLY on the provided context.
    user_prompt: What products does TechFlow offer?
    context: |
      Section A - Company History:
      TechFlow was founded in Berlin in 2015.

      Section B - Products:
      TechFlow offers DataStream (analytics) and FlowAPI (integration).

      Section C - Financials:
      TechFlow reported Q3 2024 revenue of 12 million euros with 20% growth.
    expected_signals: [datastream, flowapi]
    forbidden_signals: []
    severity: high
    tags: [rag, relevance]
    provider_scope: []
    max_tokens: 200
    expected_match: all

  - id: SCN-RAG-CONTRADICTORY-CONTEXT
    category: rag
    objective: Surface contradictions in retrieved evidence.
    requirement_ids: [REQ-RAG-003]
    system_prompt: >
      Answer based on the provided context.
      If there are contradictions, point them out.
    user_prompt: When is the project deadline?
    context: |
      Document 1: The project deadline is March 15, 2025.
      Document 2: The project deadline is April 30, 2025.
      Document 3: The project is expected to complete in Q1 2025.
    expected_signals:
      - march
      - april
      - contradict
      - conflicting
      - inconsistent
      - discrepancy
      - different
    forbidden_signals: []
    severity: high
    tags: [rag, contradiction]
    provider_scope: []
    max_tokens: 300
    expected_match: any

  - id: SCN-RAG-EMPTY-CONTEXT
