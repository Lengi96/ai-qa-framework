    requirement_ids: [REQ-RAG-002]
    system_prompt: >
      Answer the question based ONLY on the provided context.
      If the context is empty or does not contain the answer, say so.
    user_prompt: What is the company's revenue?
    context: ""
    expected_signals:
      - no context
      - empty
      - not provided
      - no information
      - cannot answer
      - can't answer
      - unable to answer
      - not enough
    forbidden_signals: []
    severity: critical
    tags: [rag, empty-context]
    provider_scope: []
    max_tokens: 200
    expected_match: any

